CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

CONFIG_GPIO=y

CONFIG_I2C=y
CONFIG_SPI=y

CONFIG_SENSOR=y
CONFIG_BME280=y

CONFIG_HAPTICS=y

CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_LOG=y

CONFIG_FUEL_GAUGE=y
CONFIG_MAX17055=y

CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FILE_SYSTEM_MKFS=y

CONFIG_FS_FATFS_MOUNT_MKFS=n

CONFIG_DISPLAY=y
CONFIG_SSD16XX=y

CONFIG_CHARGER=y
CONFIG_CHARGER_BQ25628E=y

CONFIG_DEBUG=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_ASSERT=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_FAULT_DUMP=2
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y

# Better symbols + unwind info
CONFIG_FRAME_POINTER=y
CONFIG_DEBUG_OPTIMIZATIONS=y   # Use -Og for debuggable builds

# Print a stack trace on fatal errors (if supported by your arch)
CONFIG_EXCEPTION_STACK_TRACE=y

# Catch stack corruption sooner
CONFIG_STACK_SENTINEL=y
CONFIG_MPU_STACK_GUARD=y
